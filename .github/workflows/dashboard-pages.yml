name: Dashboard Pages

on:
  workflow_run:
    workflows: ["CI Tests"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    steps:
      - name: Checkout shortest-path-tooling with submodules
        uses: actions/checkout@v6
        with:
          repository: osrs-pathfinding/shortest-path-tooling
          submodules: recursive

      - name: Update shortest-path submodule to latest master
        run: git submodule update --remote shortest-path
        shell: bash

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # The bundle picker prepends each new bundle to the top of the index,
      # so build order is reversed in the picker UI. Run the seasonal
      # dashboard FIRST so it ends up at the bottom of the picker, with the
      # always-on routes/clue/quetzal/unit-tests bundles above it.
      - name: Build seasonal Demonic Pacts League dashboard
        run: ./gradlew dashboard -PdashboardDataset=/dashboard/seasonal_briefcase_routes.csv -PdashboardBundle=seasonal-briefcase -PdashboardTitle="Seasonal — Demonic Pacts League" -PdashboardSubtitle="Briefcase teleports + region unlock varbits" -PdashboardSeasonal=true --stacktrace
        shell: bash

      - name: Build clue locations dashboard
        run: ./gradlew dashboard -PdashboardDataset=/dashboard/clue_locations_full.csv -PdashboardProfile=false --stacktrace
        shell: bash

      - name: Build quetzal whistle routes dashboard
        run: ./gradlew dashboard -PdashboardDataset=/dashboard/quetzal_whistle_routes.csv --stacktrace
        shell: bash

      - name: Build unit tests dashboard
        run: ./gradlew dashboard -PdashboardDataset=/dashboard/unit-tests.csv --stacktrace
        shell: bash

      - name: Build routes dashboard
        run: ./gradlew dashboard --stacktrace
        shell: bash

      - name: Upload dashboard bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pathfinder-dashboard-site
          path: build/reports/pathfinder-dashboard
          if-no-files-found: error

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/reports/pathfinder-dashboard

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
